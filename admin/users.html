<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HustleHub Admin - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=14">
</head>

<body class="bg-light admin-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">HustleHub SA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="users.html">Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="roles.html">User Types</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html">Storefront</a></li>
                    <li class="nav-item"><button class="nav-link admin-logout" type="button" data-admin-logout>Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="admin-hero compact">
        <div class="container">
            <span class="hero-kicker">Admin workspace</span>
            <h1>User Management</h1>
            <p>Create accounts, update roles, and keep the marketplace community tidy.</p>
        </div>
    </header>

    <main class="container py-5 admin-content">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h4 mb-3">Create / Update User</h1>
                        <form id="adminUserForm" novalidate>
                            <input type="hidden" name="userId">
                            <div class="mb-3">
                                <label class="form-label">Full name</label>
                                <input class="form-control" name="fullName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input class="form-control" type="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input class="form-control" name="phone" maxlength="10" inputmode="numeric" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location</label>
                                <input class="form-control" name="location" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">User type</label>
                                <select class="form-select" name="roleId" data-role-select required></select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Member since</label>
                                <input class="form-control" name="memberSince" placeholder="May 2026">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input class="form-control" type="password" name="password" placeholder="Leave blank when editing">
                            </div>
                            <button class="btn btn-dark w-100" type="submit">Save User</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h4 mb-3">Users</h2>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>User Type</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">&copy; 2026 HustleHub SA</p>
    </footer>

    <script src="admin-api.js"></script>
    <script src="admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
